name: Sebar_TV_Ultimate_Uploader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'بەستەری ڤیدیۆ یان m3u8 لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فیلمەکە بنووسە'
        required: true
        default: 'فیلمی_نوێ'

jobs:
  upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی چەکەکان
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q yt-dlp vk_api requests

      - name: ⬇️ داگرتنی پارێزراو بەبێ بلۆکبوون
        run: |
          yt-dlp --impersonate chrome \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 --retries 50 \
                 --fragment-retries 50 \
                 --retry-sleep 10 \
                 --sleep-requests 0.5 \
                 --limit-rate 5M \
                 --skip-unavailable-fragments \
                 --ignore-errors \
                 --continue \
                 --merge-output-format mp4 \
                 -o "video.mp4" \
                 "${{ github.event.inputs.video_url }}" || true

      - name: 🚀 فڕێدانی ڤیدیۆکە بۆ ناو قەڵای ڤی کەی
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
        run: |
          python3 -c "
          import os
          import vk_api
          from vk_api.upload import VkUpload
          
          token = os.environ.get('VK_TOKEN')
          if not token:
              print('هەڵە: کلیلە زێڕینەکە نەدۆزرایەوە!')
              exit(1)
              
          group_id = 236480315
          file_name = '${{ github.event.inputs.file_name }}'
          
          print('پەیوەندیکردن بە قەڵاکەوە...')
          vk_session = vk_api.VkApi(token=token)
          upload = VkUpload(vk_session)
          
          if os.path.exists('video.mp4'):
              print(f'بەرزکردنەوەی فیلمی: {file_name}')
              video = upload.video(
                  video_file='video.mp4',
                  name=file_name,
                  description='ئەم ڤیدیۆیە تایبەتە بە داتابەیسی سەبار تیڤی.',
                  group_id=group_id
              )
              print('سەرکەوتوو بوو! ڤیدیۆکە گەیشتە ناو کۆگاکە.')
              print('زانیاری ڤیدیۆکە:', video)
              
              os.remove('video.mp4')
              print('ڤیدیۆکە لەسەر گیتھەب سڕرایەوە بۆ پاککردنەوەی شوێن.')
          else:
              print('هەڵە: ڤیدیۆکە دانەگیراوە یان کێشەیەک هەیە!')
              exit(1)
          "
