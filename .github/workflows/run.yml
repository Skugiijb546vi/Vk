name: Sebar_TV_Fast_Uploader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'بەستەری ڤیدیۆ لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فیلمەکە بنووسە'
        required: true
        default: 'فیلمی_نوێ'
      firebase_section:
        description: 'ناوی بەشەکە لە فایەربەیس'
        required: true
      firebase_id:
        description: 'ئایدی فیلمەکە'
        required: true

jobs:
  fast_upload:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی چەکەکان
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q yt-dlp curl_cffi vk_api requests

      - name: ⬇️ داگرتنی خێرا (بە شێوازی تۆرینت و بێ سنوور)
        run: |
          yt-dlp --impersonate chrome \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 --retries 50 \
                 --concurrent-fragments 10 \
                 --merge-output-format mp4 \
                 -o "video.mp4" \
                 "${{ github.event.inputs.video_url }}" || true

      - name: 🚀 هەڵدان و ناردنی یەکسەر بۆ فایەربەیس
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          python3 -c "
          import os
          import time
          import vk_api
          import requests
          from vk_api.upload import VkUpload
          
          vk_token = os.environ.get('VK_TOKEN')
          fb_token = os.environ.get('FIREBASE_TOKEN')
          group_id = 236480315
          file_name = '${{ github.event.inputs.file_name }}'
          fb_section = '${{ github.event.inputs.firebase_section }}'
          fb_id = '${{ github.event.inputs.firebase_id }}'
          
          vk_session = vk_api.VkApi(token=vk_token)
          vk = vk_session.get_api()
          upload = VkUpload(vk_session)
          
          if os.path.exists('video.mp4'):
              print('بەرزکردنەوەی خێرا بۆ ڤی کەی...')
              video_info = upload.video(
                  video_file='video.mp4',
                  name=file_name,
                  description='فیلمی نوێ',
                  group_id=group_id
              )
              
              vid_data = video_info[0] if isinstance(video_info, list) else video_info
              owner_id = vid_data.get('owner_id')
              video_id = vid_data.get('video_id') or vid_data.get('id')
              
              print('چاوەڕوانی تەنها ٣٠ چرکە بۆ وەرگرتنی لینک...')
              time.sleep(30)
              
              get_vid = vk.video.get(videos=f'{owner_id}_{video_id}')
              files = get_vid['items'][0].get('files', {})
              
              direct_link = ''
              for q in ['mp4_1080', 'mp4_720', 'mp4_480', 'mp4_360', 'mp4_240']:
                  if q in files:
                      direct_link = files[q]
                      break
                      
              if not direct_link:
                  direct_link = get_vid['items'][0].get('player', '')
              
              print('ناردنی لینکەکە ڕاستەوخۆ بۆ فایەربەیس...')
              db_url = f'https://sarko-43d61-default-rtdb.firebaseio.com/{fb_section}/{fb_id}.json?auth={fb_token}'
              
              payload = {
                  'title': file_name,
                  'translation': 'دۆبلاژ',
                  'url': direct_link
              }
              requests.patch(db_url, json=payload)
              print('تەواو! بە خێرایی باڵندە گەیشتە فایەربەیس.')
          "
